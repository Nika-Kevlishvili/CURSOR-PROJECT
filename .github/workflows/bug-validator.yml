name: Bug Validator

on:
  repository_dispatch:
    types: [bug-validation]

  workflow_dispatch:
    inputs:
      jira_key:
        description: "Jira issue key (e.g. REG-456)"
        required: true
        type: string
      runner:
        description: "Runner to use (ubuntu-latest = GitHub-hosted; self-hosted for VPN/internal GitLab)"
        required: false
        type: choice
        options:
          - self-hosted
          - ubuntu-latest
        default: self-hosted

env:
  PYTHON_VERSION: "3.11"

jobs:
  validate-bug:
    runs-on: ${{ github.event.inputs.runner || 'self-hosted' }}
    timeout-minutes: 15

    steps:
      - name: Enable Git long paths (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: git config --global core.longpaths true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r Cursor-Project/scripts/bug-validator/requirements.txt

      - name: Extract Jira key
        id: jira
        env:
          EVENT_NAME: ${{ github.event_name }}
          KEY_DISPATCH: ${{ github.event.client_payload.jira_key }}
          KEY_INPUT: ${{ github.event.inputs.jira_key }}
        run: python Cursor-Project/scripts/bug-validator/extract_jira_key.py

      - name: Run Bug Validator
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          CONFLUENCE_SPACE_KEYS: ${{ secrets.CONFLUENCE_SPACE_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PHOENIX_LOCAL_ROOT: ${{ secrets.PHOENIX_LOCAL_ROOT }}
        run: python Cursor-Project/scripts/bug-validator/main.py --jira-key "${{ steps.jira.outputs.key }}"

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bug-validation-report
          path: Cursor-Project/scripts/bug-validator/output/
          retention-days: 30
